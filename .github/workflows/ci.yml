name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset windows-debug
      - name: Build
        run: cmake --build --preset windows-debug --parallel
      - name: Test
        run: ctest --preset windows-debug --output-on-failure
